<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNF Clinical Assistant</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 20px; color: #333; }
        #search-box { width: 100%; padding: 10px; margin-bottom: 20px; font-size: 16px; }
        #results { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>PNF Clinical Assistant</h1>
    <input type="text" id="search-box" placeholder="Search PNF drug name...">
    <div id="results"></div>

    <script>
        const input = document.getElementById('search-box');
        const results = document.getElementById('results');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const query = input.value;
                results.innerHTML = 'Searching...';
                const response = await fetch('/api/pnf/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: query })
                });
                const data = await response.json();
                results.innerHTML = data.body;
            }
        });
    </script>
</body>
</html>
